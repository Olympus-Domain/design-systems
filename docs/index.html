document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};
      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }
    for (const id of pageIds) {
      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');
      // The click interceptor owns every anchor click (not a <base target>):
      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +
        (pageIds.length > 1 ?
          'window.__bundler_pages = ' + JSON.stringify(pageIds) + ';' +
          'document.addEventListener("click", function(e){' +
            'if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.defaultPrevented) return;' +
            'var a = null, p = e.composedPath ? e.composedPath() : [e.target];' +
            'for (var j = 0; j < p.length && !a; j++) {' +

              'if (tn === "A" || tn === "a" || tn === "AREA") a = n;' +
            '}' +
            'if (!a && e.target.closest) a = e.target.closest("a, area");' +
            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }

      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 #FF6565; }\n  .off-scale-file { font-size: 12px; color: #8D8D9C; flex: 1; }\n  .off-scale-note { font-size: 11px; color: #717171; width: 140px; text-align: right; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <h1>Typography Scale<\u002Fh1>\n  <p class=\"subtitle\">System fonts. Tailwind scale used in 330 class-based instances. 31 hardcoded inline values bypass it.<\u002Fp>\n\n  <h2>Tailwind Text Scale (tokenized)<\u002Fh2>\n\n  <div class=\"type-row\">\n    <div class=\"type-meta\">\n      <div class=\"type-class\">text-3xl<\u002Fdiv>\n      <div class=\"type-size\">~30px<\u002Fdiv>\n      <div class=\"type-count\">1 use<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"type-sample\" style=\"font-size:30px\">The quick brown fox<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"type-row\">\n    <div class=\"type-meta\">\n      <div class=\"type-class\">text-2xl<\u002Fdiv>\n      <div class=\"type-size\">~24px<\u002Fdiv>\n      <div class=\"type-count\">11 uses<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"type-sample\" style=\"font-size:24px\">The quick brown fox<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"type-row\">\n    <div class=\"type-meta\">\n      <div class=\"type-class\">text-xl<\u002Fdiv>\n      <div class=\"type-size\">~20px<\u002Fdiv>\n      <div class=\"type-count\">48 uses<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"type-sample\" style=\"font-size:20px\">The quick brown fox jumps<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"type-row\">\n    <div class=\"type-meta\">\n      <div class=\"type-class\">text-lg<\u002Fdiv>\n      <div class=\"type-size\">~18px<\u002Fdiv>\n      <div class=\"type-count\">122 uses<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"type-sample\" style=\"font-size:18px\">The quick brown fox jumps over the lazy<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"type-row\">\n    <div class=\"type-meta\">\n      <div class=\"type-class\">text-base<\u002Fdiv>\n      <div class=\"type-size\">~16px<\u002Fdiv>\n      <div class=\"type-count\">71 uses<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"type-sample\" style=\"font-size:16px\">The quick brown fox jumps over the lazy dog<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"type-row\">\n    <div class=\"type-meta\">\n      <div class=\"type-class\">text-sm<\u002Fdiv>\n      <div class=\"type-size\">~14px<\u002Fdiv>\n      <div class=\"type-count\">60 uses<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"type-sample\" style=\"font-size:14px\">The quick brown fox jumps over the lazy dog and keeps running<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"type-row\">\n    <div class=\"type-meta\">\n      <div class=\"type-class\">text-xs<\u002Fdiv>\n      <div class=\"type-size\">~12px<\u002Fdiv>\n      <div class=\"type-count\">17 uses<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"type-sample\" style=\"font-size:12px\">The quick brown fox jumps over the lazy dog and keeps running through the field<\u002Fdiv>\n  <\u002Fdiv>\n\n  <h2>Font Weights<\u002Fh2>\n\n  <div class=\"weight-row\">\n    <div class=\"weight-label\">font-bold (700)<\u002Fdiv>\n    <div class=\"weight-sample\" style=\"font-weight:700\">Bold text sample<\u002Fdiv>\n    <div class=\"weight-count\">5 uses<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"weight-row\">\n    <div class=\"weight-label\">font-semibold (600)<\u002Fdiv>\n    <div class=\"weight-sample\" style=\"font-weight:600\">Semibold text sample<\u002Fdiv>\n    <div class=\"weight-count\">1 use<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"weight-row\">\n    <div class=\"weight-label\">font-medium (500)<\u002Fdiv>\n    <div class=\"weight-sample\" style=\"font-weight:500\">Medium text sample<\u002Fdiv>\n    <div class=\"weight-count\">1 use<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"weight-row\">\n    <div class=\"weight-label\">font-normal (400)<\u002Fdiv>\n    <div class=\"weight-sample\" style=\"font-weight:400\">Normal text sample<\u002Fdiv>\n    <div class=\"weight-count\">1 use (default)<\u002Fdiv>\n  <\u002Fdiv>\n\n  <h2>Off-Scale Values (hardcoded, bypassing tokens)<\u002Fh2>\n  <div class=\"off-scale\">\n    <div class=\"off-scale-item\">\n      <div class=\"off-scale-value\">50px<\u002Fdiv>\n      <div class=\"off-scale-file\">RestTimer.js — countdown display<\u002Fdiv>\n      <div class=\"off-scale-note\">Needs display-xl token<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"off-scale-item\">\n      <div class=\"off-scale-value\">45px<\u002Fdiv>\n      <div class=\"off-scale-file\">RestTimer.js — countdown (smaller)<\u002Fdiv>\n      <div class=\"off-scale-note\">Needs display-lg token<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"off-scale-item\">\n      <div class=\"off-scale-value\">30px<\u002Fdiv>\n      <div class=\"off-scale-file\">EndWorkoutScreen.js — section header<\u002Fdiv>\n      <div class=\"off-scale-note\">= text-3xl, use token<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"off-scale-item\">\n      <div class=\"off-scale-value\">16px (×17)<\u002Fdiv>\n      <div class=\"off-scale-file\">Multiple files — inline style<\u002Fdiv>\n      <div class=\"off-scale-note\">= text-base, use token<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"off-scale-item\">\n      <div class=\"off-scale-value\">10px<\u002Fdiv>\n      <div class=\"off-scale-file\">EndWorkoutScreen.js — micro label<\u002Fdiv>\n      <div class=\"off-scale-note\">Below scale, needs text-micro<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>","components/tokens/spacing-sizing":"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Spacing, Sizing &amp; Radius<\u002Ftitle>\n<style>\n  * { margin: 0; padding: 0; box-sizing: border-box; }\n  body { background: #0F0F11; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 32px; }\n  h1 { font-size: 24px; margin-bottom: 8px; color: #F5E989; }\n  .subtitle { color: #8D8D9C; font-size: 14px; margin-bottom: 32px; }\n  h2 { font-size: 16px; color: #8076AB; margin-bottom: 16px; margin-top: 32px; text-transform: uppercase; letter-spacing: 1px; }\n\n  .height-row { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; }\n  .height-bar { background: #F5E989; border-radius: 8px; display: flex; align-items: center; padding: 0 16px; }\n  .height-label { font-size: 13px; font-family: monospace; color: #F5E989; width: 200px; }\n  .height-value { font-size: 12px; color: #141121; font-weight: 600; }\n\n  .spacing-row { display: flex; align-items: center; gap: 16px; margin-bottom: 8px; }\n  .spacing-label { font-size: 13px; font-family: monospace; color: #8D8D9C; width: 240px; }\n  .spacing-bar { background: #8076AB; border-radius: 4px; height: 24px; }\n  .spacing-val { font-size: 12px; color: #717171; width: 60px; }\n\n  .radius-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; }\n  .radius-item { text-align: center; }\n  .radius-box { width: 80px; height: 80px; border: 2px solid #F5E989; margin: 0 auto 8px; }\n  .radius-name { font-size: 12px; font-family: monospace; color: #F5E989; }\n  .radius-value { font-size: 11px; color: #8D8D9C; }\n  .radius-count { font-size: 11px; color: #717171; }\n\n  .overlay-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }\n  .overlay-item { height: 80px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-direction: column; border: 1px solid #3b3651; position: relative; overflow: hidden; }\n  .overlay-bg { position: absolute; inset: 0; background: linear-gradient(135deg, #F5E989 0%, #54BE98 100%); }\n  .overlay-fg { position: relative; z-index: 1; font-size: 12px; font-weight: 600; }\n  .overlay-val { position: relative; z-index: 1; font-size: 11px; color: rgba(255,255,255,0.7); }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <h1>Spacing, Sizing &amp; Radius<\u002Fh1>\n  <p class=\"subtitle\">3 height tokens, 1 spacing token. Most spacing uses Tailwind defaults or hardcoded values.<\u002Fp>\n\n  <h2>Component Heights (tokenized)<\u002Fh2>\n  <div class=\"height-row\">\n    <div class=\"height-label\">h-header<\u002Fdiv>\n    <div class=\"height-bar\" style=\"height:56px; width: 300px;\"><span class=\"height-value\">56px<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"height-row\">\n    <div class=\"height-label\">h-button<\u002Fdiv>\n    <div class=\"height-bar\" style=\"height:48px; width: 300px;\"><span class=\"height-value\">48px<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"height-row\">\n    <div class=\"height-label\">h-input<\u002Fdiv>\n    <div class=\"height-bar\" style=\"height:40px; width: 300px;\"><span class=\"height-value\">40px<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n\n  <h2>Spacing (only 1 token)<\u002Fh2>\n  <div class=\"spacing-row\">\n    <div class=\"spacing-label\">screenHorizontalPadding (token)<\u002Fdiv>\n    <div class=\"spacing-bar\" style=\"width: 64px;\"><\u002Fdiv>\n    <div class=\"spacing-val\">16px<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"margin-top: 16px; padding: 16px; background: #1d1b2a; border-radius: 8px;\">\n    <p style=\"font-size: 13px; color: #8D8D9C; margin-bottom: 8px;\">Most-used hardcoded spacing (in StyleSheet objects):<\u002Fp>\n    <div class=\"spacing-row\">\n      <div class=\"spacing-label\" style=\"color:#FF6565\">10px — margin/padding (24 uses)<\u002Fdiv>\n      <div class=\"spacing-bar\" style=\"width: 40px; background: #FF6565;\"><\u002Fdiv>\n      <div class=\"spacing-val\">10px<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"spacing-row\">\n      <div class=\"spacing-label\" style=\"color:#FF6565\">5px — margin/padding (8 uses)<\u002Fdiv>\n      <div class=\"spacing-bar\" style=\"width: 20px; background: #FF6565;\"><\u002Fdiv>\n      <div class=\"spacing-val\">5px<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"spacing-row\">\n      <div class=\"spacing-label\" style=\"color:#FF6565\">20px — padding (7 uses)<\u002Fdiv>\n      <div class=\"spacing-bar\" style=\"width: 80px; background: #FF6565;\"><\u002Fdiv>\n      <div class=\"spacing-val\">20px<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"spacing-row\">\n      <div class=\"spacing-label\" style=\"color:#FF6565\">8px — padding (6 uses)<\u002Fdiv>\n      <div class=\"spacing-bar\" style=\"width: 32px; background: #FF6565;\"><\u002Fdiv>\n      <div class=\"spacing-val\">8px<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <h2>Border Radius<\u002Fh2>\n  <div class=\"radius-grid\">\n    <div class=\"radius-item\">\n      <div class=\"radius-box\" style=\"border-radius: 9999px;\"><\u002Fdiv>\n      <div class=\"radius-name\">rounded-full<\u002Fdiv>\n      <div class=\"radius-value\">9999px<\u002Fdiv>\n      <div class=\"radius-count\">59 uses<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"radius-item\">\n      <div class=\"radius-box\" style=\"border-radius: 16px;\"><\u002Fdiv>\n      <div class=\"radius-name\">rounded-2xl<\u002Fdiv>\n      <div class=\"radius-value\">16px<\u002Fdiv>\n      <div class=\"radius-count\">19 uses<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"radius-item\">\n      <div class=\"radius-box\" style=\"border-radius: 12px;\"><\u002Fdiv>\n      <div class=\"radius-name\">rounded-xl<\u002Fdiv>\n      <div class=\"radius-value\">12px<\u002Fdiv>\n      <div class=\"radius-count\">34 uses<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"radius-item\">\n      <div class=\"radius-box\" style=\"border-radius: 8px;\"><\u002Fdiv>\n      <div class=\"radius-name\">rounded-lg<\u002Fdiv>\n      <div class=\"radius-value\">8px<\u002Fdiv>\n      <div class=\"radius-count\">42 uses<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"radius-item\">\n      <div class=\"radius-box\" style=\"border-radius: 6px;\"><\u002Fdiv>\n      <div class=\"radius-name\">rounded-md<\u002Fdiv>\n      <div class=\"radius-value\">6px<\u002Fdiv>\n      <div class=\"radius-count\">13 uses<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"radius-item\">\n      <div class=\"radius-box\" style=\"border-radius: 4px;\"><\u002Fdiv>\n      <div class=\"radius-name\">rounded<\u002Fdiv>\n      <div class=\"radius-value\">4px<\u002Fdiv>\n      <div class=\"radius-count\">28 uses<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"radius-item\">\n      <div class=\"radius-box\" style=\"border-radius: 24px;\"><\u002Fdiv>\n      <div class=\"radius-name\">rounded-3xl<\u002Fdiv>\n      <div class=\"radius-value\">24px<\u002Fdiv>\n      <div class=\"radius-count\">7 uses<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <h2>Modal Overlay Opacity<\u002Fh2>\n  <p style=\"font-size: 13px; color: #8D8D9C; margin-bottom: 16px;\">6 different implementations for the same pattern. <code style=\"color:#F5E989\">bg-black/70<\u002Fcode> is the dominant one (10 modals).<\u002Fp>\n  <div class=\"overlay-grid\">\n    <div class=\"overlay-item\">\n      <div class=\"overlay-bg\"><\u002Fdiv>\n      <div style=\"position:absolute; inset:0; background: rgba(0,0,0,0.5);\"><\u002Fdiv>\n      <div class=\"overlay-fg\">rgba(0,0,0,0.5)<\u002Fdiv>\n      <div class=\"overlay-val\">6 modals<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"overlay-item\">\n      <div class=\"overlay-bg\"><\u002Fdiv>\n      <div style=\"position:absolute; inset:0; background: rgba(0,0,0,0.7);\"><\u002Fdiv>\n      <div class=\"overlay-fg\">bg-black/70<\u002Fdiv>\n      <div class=\"overlay-val\">10 modals<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"overlay-item\">\n      <div class=\"overlay-bg\"><\u002Fdiv>\n      <div style=\"position:absolute; inset:0; background: rgba(20,18,32,0.9);\"><\u002Fdiv>\n      <div class=\"overlay-fg\">rgba(20,18,32,0.9)<\u002Fdiv>\n      <div class=\"overlay-val\">2 modals<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>","components/components/buttons":"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Buttons<\u002Ftitle>\n<style>\n  * { margin: 0; padding: 0; box-sizing: border-box; }\n  body { background: #141121; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 32px; }\n  h1 { font-size: 24px; margin-bottom: 8px; color: #F5E989; }\n  .subtitle { color: #8D8D9C; font-size: 14px; margin-bottom: 32px; }\n  h2 { font-size: 14px; color: #8076AB; margin-bottom: 12px; margin-top: 28px; text-transform: uppercase; letter-spacing: 1px; }\n  .component-card { background: #1d1b2a; border-radius: 16px; padding: 24px; margin-bottom: 16px; }\n  .component-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }\n  .component-props { font-size: 12px; color: #8D8D9C; font-family: monospace; margin-bottom: 16px; }\n  .component-usage { font-size: 11px; color: #717171; margin-bottom: 16px; }\n  .preview { padding: 20px; background: #141121; border-radius: 12px; display: flex; flex-direction: column; gap: 12px; align-items: stretch; }\n  .btn-large { height: 48px; width: 100%; border-radius: 9999px; border: 2px solid; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; font-family: inherit; }\n  .btn-primary { background: transparent; border-color: #F5E989; color: #F5E989; }\n  .btn-filled { background: #F5E989; border-color: #F5E989; color: #141121; }\n  .btn-disabled { background: transparent; border-color: #302D3E; color: #302D3E; cursor: not-allowed; }\n  .btn-arrow { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: transparent; border: none; cursor: pointer; }\n  .btn-arrow-text { font-size: 16px; color: #fff; }\n  .btn-arrow-icon { color: #D9D9D9; font-size: 18px; }\n  .btn-choice { padding: 10px 20px; border-radius: 12px; border: 1px solid #3b3651; background: transparent; color: #8D8D9C; font-size: 14px; cursor: pointer; font-family: inherit; }\n  .btn-choice-active { border-color: #F5E989; background: #F5E989; color: #141121; }\n  .btn-back { width: 40px; height: 40px; border-radius: 9999px; border: none; background: transparent; color: #F5E989; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; }\n  .btn-settings { width: 40px; height: 40px; border-radius: 9999px; border: none; background: transparent; color: #8D8D9C; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }\n  .row { display: flex; gap: 12px; align-items: center; }\n  .badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 4px; background: #232329; color: #54BE98; margin-left: 8px; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <h1>Buttons<\u002Fh1>\n  <p class=\"subtitle\">5 button components — used across 19+ screens. All DS-ready.<\u002Fp>\n\n  <div class=\"component-card\">\n    <div class=\"component-name\">FlexibleLargeButton <span class=\"badge\">13 screens<\u002Fspan><\u002Fdiv>\n    <div class=\"component-props\">props: buttonText, onPress, colorScheme, textColorScheme, disabled<\u002Fdiv>\n    <div class=\"component-usage\">Primary CTA — full-width pill button. Used on every form screen.<\u002Fdiv>\n    <div class=\"preview\">\n      <button class=\"btn-large btn-filled\">Save Changes<\u002Fbutton>\n      <button class=\"btn-large btn-primary\">Sign Up<\u002Fbutton>\n      <button class=\"btn-large btn-disabled\" disabled=\"\">Disabled<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"component-card\">\n    <div class=\"component-name\">FlexibleArrowButton <span class=\"badge\">2 screens<\u002Fspan><\u002Fdiv>\n    <div class=\"component-props\">props: text, onPress<\u002Fdiv>\n    <div class=\"component-usage\">List item / navigation row with right chevron.<\u002Fdiv>\n    <div class=\"preview\">\n      <div class=\"btn-arrow\" style=\"border-bottom: 1px solid #232329;\">\n        <span class=\"btn-arrow-text\">Edit Profile<\u002Fspan>\n        <span class=\"btn-arrow-icon\">›<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"btn-arrow\" style=\"border-bottom: 1px solid #232329;\">\n        <span class=\"btn-arrow-text\">Change Password<\u002Fspan>\n        <span class=\"btn-arrow-icon\">›<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"btn-arrow\">\n        <span class=\"btn-arrow-text\">Privacy Settings<\u002Fspan>\n        <span class=\"btn-arrow-icon\">›<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"component-card\">\n    <div class=\"component-name\">FlexibleChoiceButton<\u002Fdiv>\n    <div class=\"component-props\">props: onPress, highlighted, label<\u002Fdiv>\n    <div class=\"component-usage\">Selection chip — highlighted state toggles accent fill.<\u002Fdiv>\n    <div class=\"preview\" style=\"flex-direction: row; flex-wrap: wrap;\">\n      <button class=\"btn-choice btn-choice-active\">Strength<\u002Fbutton>\n      <button class=\"btn-choice\">Cardio<\u002Fbutton>\n      <button class=\"btn-choice\">Flexibility<\u002Fbutton>\n      <button class=\"btn-choice\">HIIT<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"component-card\">\n    <div class=\"component-name\">FlexibleBackButton &amp; SettingsButton<\u002Fdiv>\n    <div class=\"component-props\">FlexibleBackButton: styling, onPress, size | SettingsButton: onPress<\u002Fdiv>\n    <div class=\"component-usage\">Icon buttons — back arrow and gear icon. Used in headers.<\u002Fdiv>\n    <div class=\"preview\" style=\"flex-direction: row; justify-content: space-between;\">\n      <div class=\"row\">\n        <button class=\"btn-back\">‹<\u002Fbutton>\n        <span style=\"font-size: 13px; color: #8D8D9C;\">FlexibleBackButton<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <span style=\"font-size: 13px; color: #8D8D9C;\">SettingsButton<\u002Fspan>\n        <button class=\"btn-settings\">⚙<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"component-card\">\n    <div class=\"component-name\">Checkbox<\u002Fdiv>\n    <div class=\"component-props\">props: onPress, checked<\u002Fdiv nent-card\">\n    <div class=\"component-name\">ThreeOptionToggle<\u002Fdiv>\n    <div class=\"component-props\">props: (complex — options array, selectedOption, setSelectedOption)<\u002Fdiv>\n    <div class=\"component-usage\">Three-way selector — used for profile tabs (Posts / Workouts / Stats).<\u002Fdiv>\n    <div class=\"preview\" style=\"align-items: center;\">\n      <div class=\"three-toggle\">\n        <button class=\"three-toggle-option three-toggle-active\">Posts<\u002Fbutton>\n        <button class=\"three-toggle-option\">Workouts<\u002Fbutton>\n        <button class=\"three-toggle-option\">Stats<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"component-card\">\n    <div class=\"component-name\">RestTimeSlider <span class=\"badge\">2 screens<\u002Fspan><\u002Fdiv>\n    <div class=\"component-props\">props: restTime, setRestTime<\u002Fdiv>\n    <div class=\"component-usage\">Slider for selecting rest time between sets.<\u002Fdiv>\n    <div class=\"preview\">\n      <div>\n        <div style=\"position: relative;\">\n          <div class=\"slider-track\">\n            <div class=\"slider-fill\"><\u002Fdiv>\n            <div class=\"slider-thumb\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"slider-labels\">\n          <span>0:30<\u002Fspan>\n          <span style=\"color: #F5E989; font-weight: 600;\">1:30<\u002Fspan>\n          <span>5:00<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"component-card\">\n    <div class=\"component-name\">MultipleChoice<\u002Fdiv>\n    <div class=\"component-props\">props: option, selected, onSelect<\u002Fdiv>\n    <div class=\"component-usage\">Chip selector for multi-option choices.<\u002Fdiv>\n    <div class=\"preview\">\n      <div class=\"choice-grid\">\n        <div class=\"choice-item choice-active\">Push<\u002Fdiv>\n        <div class=\"choice-item choice-inactive\">Pull<\u002Fdiv>\n        <div class=\"choice-item choice-active\">Legs<\u002Fdiv>\n        <div class=\"choice-item choice-inactive\">Core<\u002Fdiv>\n        <div class=\"choice-item choice-inactive\">Full Body<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"component-card\">\n    <div class=\"component-name\">GenderToggle<\u002Fdiv>\n    <div class=\"component-props\">props: selected, onSelect<\u002Fdiv>\n    <div class=\"component-usage\">Two-option card selector for gender. From TeamsComponents.<\u002Fdiv>\n    <div class=\"preview\">\n      <div class=\"gender-toggle\">\n        <div class=\"gender-option gender-active\">Male<\u002Fdiv>\n        <div class=\"gender-option gender-inactive\">Female<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"component-card\">\n    <div class=\"component-name\">TimeframeSelector<\u002Fdiv>\n    <div class=\"component-props\">props: timeframes, selectedTimeframe, handleSelectTimeframe<\u002Fdiv>\n    <div class=\"component-usage\">Pill-based period selector for analytics views.<\u002Fdiv>\n    <div class=\"preview\" style=\"align-items: flex-start;\">\n      <div class=\"timeframe-row\">\n        <div class=\"timeframe-item timeframe-inactive\">1W<\u002Fdiv>\n        <div class=\"timeframe-item timeframe-inactive\">1M<\u002Fdiv>\n        <div class=\"timeframe-item timeframe-active\">3M<\u002Fdiv>\n        <div class=\"timeframe-item timeframe-inactive\">6M<\u002Fdiv>\n        <div class=\"timeframe-item timeframe-inactive\">1Y<\u002Fdiv>\n        <div class=\"timeframe-item timeframe-inactive\">All<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>","components/components/feedback-layout":"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Feedback &amp; Layout<\u002Ftitle>\n<style>\n  * { margin: 0; padding: 0; box-sizing: border-box; }\n  body { background: #141121; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 32px; }\n  h1 { font-size: 24px; margin-bottom: 8px; color: #F5E989; }\n  .subtitle { color: #8D8D9C; font-size: 14px; margin-bottom: 32px; }\n  .component-card { background: #1d1b2a; border-radius: 16px; padding: 24px; margin-bottom: 16px; }\n  .component-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }\n  .component-props { font-size: 12px; color: #8D8D9C; font-family: monospace; margin-bottom: 16px; }\n  .component-usage { font-size: 11px; color: #717171; margin-bottom: 16px; }\n  .preview { padding: 20px; background: #141121; border-radius: 12px; }\n  .badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 4px; background: #232329; color: #54BE98; margin-left: 8px; }\n\n  .loading-overlay { display: flex; align-items: center; justify-content: center; height: 100px; background: rgba(0,0,0,0.4); border-radius: 12px; }\n  .spinner { width: 32px; height: 32px; border: 3px solid #302D3E; border-top-color: #F5E989; border-radius: 50%; animation: spin 1s linear infinite; }\n  @keyframes spin { to { transform: rotate(360deg); } }\n\n  .modal-overlay { background: rgba(0,0,0,0.7); border-radius: 12px; padding: 40px; display: flex; align-items: center; justify-content: center; }\n  .modal-content { background: #1d1b2a; border-radius: 16px; padding: 32px; text-align: center; min-width: 200px; }\n  .modal-icon { font-size: 32px; margin-bottom: 12px; }\n  .modal-text { font-size: 16px; color: #fff; }\n\n  .toast { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; margin-bottom: 8px; }\n  .toast-bar { width: 4px; height: 32px; border-radius: 2px; }\n  .toast-text { font-size: 14px; }\n\n  .skeleton { border-radius: 4px; background: linear-gradient(90deg, #2c2c2e 25%, #3b3651 50%, #2c2c2e 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }\n  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }\n\n  .screen-container { background: #141121; border-radius: 12px; border: 1px solid #232329; overflow: hidden; }\n  .screen-header-bar { display: flex; align-items: center; justify-content: space-between; padding: 16px; border-bottom: 1px solid #232329; }\n  .screen-header-title { font-size: 20px; font-weight: 600; }\n  .screen-header-actions { display: flex; gap: 8px; }\n  .screen-body { padding: 16px; min-height: 80px; }\n  .header-bar { height: 56px; display: flex; align-items: center; padding: 0 16px; gap: 12px; }\n  .header-back { font-size: 24px; color: #F5E989; cursor: pointer; }\n  .header-title { font-size: 18px; font-weight: 600; flex: 1; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <h1>Feedback &amp; Layout<\u002Fh1>\n  <p class=\"subtitle\">Loading states, modals, toasts, skeletons, and screen layout containers.<\u002Fp>\n\n  <div class=\"component-card\">\n    <div class=\"component-name\">LoadingIcon <span class=\"badge\">13 screens<\u002Fspan><\u002Fdiv>\n    <div class=\"component-props\">props: loading<\u002Fdiv>\n    <div class=\"component-usage\">Full-screen modal spinner overlay. Blocks interaction during async operations.<\u002Fdiv>\n    <div class=\"preview\">\n      <div class=\"loading-overlay\">\n        <div class=\"spinner\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"component-card\">\n    <div class=\"component-name\">SavedModal / BlockedModal<\u002Fdiv>\n    <div class=\"component-props\">SavedModal: text='Workout Saved' | BlockedModal: text='User Blocked!'<\u002Fdiv>\n    <div class=\"component-usage\">Simple confirmation overlay with icon and text. Auto-dismisses.<\u002Fdiv>\n    <div class=\"preview\">\n      <div class=\"modal-overlay\">\n        <div class=\"modal-content\">\n          <div class=\"modal-icon\">✓<\u002Fdiv>\n          <div class=\"modal-text\">Workout Saved<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"component-card\">\n    <div class=\"component-name\">ToastNotification<\u002Fdiv>\n    <div class=\"component-props\">props: (hook-based — useToastNotification)<\u002Fdiv>\n    <div class=\"component-usage\">Slide-down notification bar. Has its own isolated color palette (see token audit).<\u002Fdiv>\n    <div class=\"preview\">\n      <div class=\"toast\" style=\"background: #1e1a32;\">\n        <div class=\"toast-bar\" style=\"background: #4D8C2E;\"><\u002Fdiv>\n        <div class=\"toast-text\">Workout saved successfully<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"toast\" style=\"background: #1e1a32;\">\n        <div class=\"toast-bar\" style=\"background: #CC3333;\"><\u002Fdiv>\n        <div class=\"toast-text\">Failed to save workout<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"toast\" style=\"background: #1e1a32;\">\n        <div class=\"toast-bar\" style=\"background: #E6B800;\"><\u002Fdiv>\n        <div class=\"toast-text\">Connection unstable<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"toast\" style=\"background: #1e1a32;\">\n        <div class=\"toast-bar\" style=\"background: #2E7FCC;\"><\u002Fdiv>\n        <div class=\"toast-text\">New follower request<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"component-card\">\n    <div class=\"component-name\">SkeletonLoader / StoredWorkoutSkeleton / StatsSkeleton<\u002Fdiv>\n    <div class=\"component-props\">SkeletonLoader: width, height, borderRadius<\u002Fdiv>\n    <div class=\"component-usage\">Shimmer placeholder while content loads. Three variants for different content types.<\u002Fdiv>\n    <div class=\"preview\" style=\"display: flex; flex-direction: column; gap: 12px;\">\n      <div style=\"display: flex; gap: 12px; align-items: center;\">\n        <div class=\"skeleton\" style=\"width: 40px; height: 40px; border-radius: 20px; flex-shrink: 0;\"><\u002Fdiv>\n        <div style=\"flex: 1; display: flex; flex-direction: column; gap: 8px;\">\n          <div class=\"skeleton\" style=\"width: 60%; height: 14px;\"><\u002Fdiv>\n          <div class=\"skeleton\" style=\"width: 40%; height: 12px;\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"skeleton\" style=\"width: 100%; height: 120px; border-radius: 12px;\"><\u002Fdiv>\n      <div style=\"display: flex; gap: 8px;\">\n        <div class=\"skeleton\" style=\"width: 33%; height: 32px; border-radius: 8px;\"><\u002Fdiv>\n        <div class=\"skeleton\" style=\"width: 33%; height: 32px; border-radius: 8px;\"><\u002Fdiv>\n        <div class=\"skeleton\" style=\"width: 33%; height: 32px; border-radius: 8px;\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"component-card\">\n    <div class=\"component-name\">FlexibleHeader <span class=\"badge\">19 screens<\u002Fspan><\u002Fdiv>\n    <div class=\"component-props\">props: backButton, backButtonOnPress, backButtonStyle, text, headerSpacing<\u002Fdiv>\n    <div class=\"component-usage\">Universal screen header — 56px height. Optional back button. Most-used component in the app.<\u002Fdiv>\n    <div class=\"preview\">\n      <div class=\"header-bar\" style=\"background: #141121; border-radius: 8px; margin-bottom: 8px;\">\n        <div class=\"header-title\">Analytics<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"header-bar\" style=\"background: #141121; border-radius: 8px;\">\n        <div class=\"header-back\">‹<\u002Fdiv>\n        <div class=\"header-title\">Edit Profile<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"component-card\">\n    <div class=\"component-name\">ScreenContainer + ScreenHeader <span class=\"badge\">7 + 5 screens<\u002Fspan><\u002Fdiv>\n    <div class=\"component-props\">ScreenContainer: children | ScreenHeader: title, actions<\u002Fdiv>\n    <div class=\"component-usage\">Safe-area layout wrapper + titled header with optional action buttons. Used together on browse/list screens.<\u002Fdiv>\n    <div class=\"preview\">\n      <div class=\"screen-container\">\n        <div class=\"screen-header-bar\">\n          <div class=\"screen-header-title\">Workouts<\u002Fdiv>\n          <div class=\"screen-header-actions\">\n            <div style=\"width: 24px; height: 24px; border-radius: 4px; background: #232329;\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"screen-body\">\n          <div style=\"color: #8D8D9C; font-size: 13px; text-align: center; padding: 20px;\">Screen content area<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>","components/components/social":"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Social &amp; Sharing Components<\u002Ftitle>\n<style>\n  * { margin: 0; padding: 0; box-sizing: border-box; }\n  body { background: #141121; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 32px; }\n  h1 { font-size: 24px; margin-bottom: 8px; color: #F5E989; }\n  .subtitle { color: #8D8D9C; font-size: 14px; margin-bottom: 32px; }\n  .component-card { background: #1d1b2a; border-radius: 16px; padding: 24px; margin-bottom: 16px; }\n  .component-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }\n  .component-meta { font-size: 12px; color: #8D8D9C; margin-bottom: 4px; }\n  .component-deps { font-size: 11px; color: #717171; margin-bottom: 16px; }\n  .preview { padding: 20px; background: #141121; border-radius: 12px; }\n  .badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 4px; margin-left: 4px; }\n  .badge-app { background: #302D3E; color: #FF6565; }\n  .badge-possible { background: #232329; color: #E6C466; }\n  .badge-ready { background: #232329; color: #54BE98; }\n\n  .post-card { background: #1d1b2a; border-radius: 16px; overflow: hidden; }\n  .post-header { display: flex; align-items: center; gap: 10px; padding: 14px 16px; }\n  .post-avatar { width: 36px; height: 36px; border-radius: 18px; background: #302D3E; flex-shrink: 0; }\n  .post-user { flex: 1; }\n  .post-username { font-size: 14px; font-weight: 600; }\n  .post-time { font-size: 11px; color: #8D8D9C; }\n  .post-streak { display: flex; align-items: center; gap: 4px; }\n  .post-streak-fire { font-size: 14px; }\n  .post-body { padding: 0 16px; }\n  .post-workout-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }\n  .post-stats { display: flex; gap: 16px; padding: 12px 0; }\n  .post-stat { display: flex; align-items: center; gap: 4px; }\n  .post-stat-icon { font-size: 14px; }\n  .post-stat-value { font-size: 13px; color: #F5E989; font-weight: 600; }\n  .post-stat-label { font-size: 11px; color: #8D8D9C; }\n  .post-interactions { display: flex; align-items: center; gap: 20px; padding: 12px 16px; border-top: 1px solid #232329; }\n  .post-action { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #8D8D9C; }\n  .post-action-active { color: #F5E989; }\n  .post-location { font-size: 12px; color: #8076AB; padding: 4px 16px 12px; }\n\n  .comment-row { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid #232329; }\n  .comment-avatar { width: 28px; height: 28px; border-radius: 14px; background: #302D3E; flex-shrink: 0; }\n  .comment-body { flex: 1; }\n  .comment-user { font-size: 13px; font-weight: 600; }\n  .comment-text { font-size: 13px; color: #8D8D9C; margin-top: 2px; }\n  .comment-time { font-size: 10px; color: #717171; margin-top: 4px; }\n  .comment-input { display: flex; gap: 8px; align-items: center; padding: 12px 0; }\n  .comment-input-field { flex: 1; height: 36px; border: 1px solid #232329; border-radius: 18px; padding: 0 14px; font-size: 13px; color: #8D8D9C; background: transparent; }\n\n  .follow-btn { padding: 6px 16px; border-radius: 9999px; font-size: 12px; font-weight: 600; }\n  .follow-btn-follow { background: #F5E989; color: #141121; }\n  .follow-btn-following { background: transparent; border: 1px solid #8D8D9C; color: #8D8D9C; }\n  .follow-btn-plus { background: transparent; border: 1px solid #F5E989; color: #F5E989; }\n\n  .empty-state { text-align: center; padding: 32px; }\n  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }\n  .empty-text { font-size: 14px; color: #8D8D9C; }\n\n  .badges-row { display: flex; gap: 8px; }\n  .stat-badge { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; background: #232329; }\n  .stat-badge-label { font-size: 11px; color: #8D8D9C; }\n  .stat-badge-value { font-size: 13px; color: #F5E989; font-weight: 600; }\n\n  .share-row { display: flex; gap: 12px; justify-content: center; padding: 16px; }\n  .share-btn { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <h1>Social &amp; Sharing<\u002Fh1>\n  <p class=\"subtitle\">21 components across SocialComponents (16) and SharingComponents (5). Mostly app-specific due to UserContext + API deps.<\u002Fp>\n\n  <div class=\"component-card\">\n    <div class=\"component-name\">SocialPost + SocialPostHeader + SocialPostInteractions <span class=\"badge badge-app\">App<\u002Fspan><\u002Fdiv>\n    <div class=\"component-meta\">The main social feed post card — header with avatar/streak, workout stats, and interaction bar.<\u002Fdiv>\n    <div class=\"component-deps\">Deps: UserContext, APIRequest, SocialRequest, WorkoutRequest, MediaRequest<\u002Fdiv>\n    <div class=\"preview\">\n      <div class=\"post-card\">\n        <div class=\"post-header\">\n          <div class=\"post-avatar\"><\u002Fdiv>\n          <div class=\"post-user\">\n            <div class=\"post-username\">john_lifts<\u002Fdiv>\n            <div class=\"post-time\">2:30 PM • Push Day A<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"post-streak\">\n            <div class=\"post-streak-fire\" style=\"color: #FA3C05;\">🔥<\u002Fdiv>\n            <span style=\"font-size: 12px; color: #8D8D9C;\">5<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"post-body\">\n          <div class=\"post-stats\">\n            <div class=\"post-stat\">\n              <div class=\"post-stat-value\">12,450<\u002Fdiv>\n              <div class=\"post-stat-label\">lbs<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"post-stat\">\n              <div class=\"post-stat-value\">58<\u002Fdiv>\n              <div class=\"post-stat-label\">min<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"post-stat\">\n              <div class=\"post-stat-value\">3<\u002Fdiv>\n              <div class=\"post-stat-label\">PRs<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"post-location\">📍 Gold's Gym, Venice<\u002Fdiv>\n        <div class=\"post-interactions\">\n          <div class=\"post-action post-action-active\">❤ 12<\u002Fdiv>\n          <div class=\"post-action\">💬 3<\u002Fdiv>\n          <div class=\"post-action\">🔖<\u002Fdiv>\n          <div class=\"post-action\" style=\"margin-left: auto;\">↗<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"component-card\">\n    <div class=\"component-name\">VolumeTimePRsBadges <span class=\"badge badge-possible\">DS-possible<\u002Fspan><\u002Fdiv>\n    <div class=\"component-meta\">Compact stat badges showing volume, duration, and PR count.<\u002Fdiv>\n    <div class=\"component-deps\">Props: volume, duration, tonnageIncrease, setTimeInSeconds<\u002Fdiv>\n    <div class=\"preview\">\n      <div class=\"badges-row\">\n        <div class=\"stat-badge\">\n          <span class=\"stat-badge-label\">Volume<\u002Fspan>\n          <span class=\"stat-badge-value\">12,450 lbs<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"stat-badge\">\n          <span class=\"stat-badge-label\">Time<\u002Fspan>\n          <span class=\"stat-badge-value\">58 min<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"stat-badge\">\n          <span class=\"stat-badge-label\">PRs<\u002Fspan>\n          <span class=\"stat-badge-value\">3 🏆<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"component-card\">\n    <div class=\"component-name\">Comment + BottomOfScreenComments <span class=\"badge badge-app\">App<\u002Fspan><\u002Fdiv>\n    <div class=\"component-meta\">Comment thread view with input. Supports @mentions (MentionText). Placeholder color inconsistency: uses #999999 instead of #8D8D9C.<\u002Fdiv>\n    <div class=\"component-deps\">Deps: UserContext, APIRequest, SocialRequest<\u002Fdiv>\n    <div class=\"preview\">\n      <div class=\"comment-row\">\n        <div class=\"comment-avatar\"><\u002Fdiv>\n        <div class=\"comment-body\">\n          <div class=\"comment-user\">sarah_strong<\u002Fdiv>\n          <div class=\"comment-text\">Great workout! Those bench numbers are insane 💪<\u002Fdiv>\n          <div class=\"comment-time\">2h ago • Reply<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"comment-row\">\n        <div class=\"comment-avatar\"><\u002Fdiv>\n        <div class=\"comment-body\">\n          <div class=\"comment-user\">mike_fitness<\u002Fdiv>\n          <div class=\"comment-text\"><span style=\"color: #8076AB;\">@john_lifts<\u002Fspan> keep pushing!<\u002Fdiv>\n          <div class=\"comment-time\">1h ago • Reply<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"comment-input\">\n        <div class=\"comment-avatar\" style=\"width:24px; height:24px; border-radius:12px;\"><\u002Fdiv>\n        <div class=\"comment-input-field\" style=\"display:flex; align-items:center;\"><span style=\"color:#999999; font-size:13px;\">Add a comment...<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"component-card\">\n    <div class=\"component-name\">FollowFollowingButton + PlusFollowButton <span class=\"badge badge-app\">App<\u002Fspan><\u002Fdiv>\n    <div class=\"component-meta\">Follow state buttons — three variants: Follow, Following, Requested.<\u002Fdiv>\n    <div class=\"component-deps\">Deps: UserContext, SocialRequest<\u002Fdiv>\n    <div class=\"preview\" style=\"display: flex; gap: 12px; align-items: center;\">\n      <div class=\"follow-btn follow-btn-follow\">Follow<\u002Fdiv>\n      <div class=\"follow-btn follow-btn-following\">Following<\u002Fdiv>\n      <div class=\"follow-btn\" style=\"background: transparent; border: 1px solid #717171; color: #717171;\">Requested<\u002Fdiv>\n      <div class=\"follow-btn follow-btn-plus\">+ Follow<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"component-card\">\n    <div class=\"component-name\">Bookmark + Like <span class=\"badge badge-app\">App<\u002Fspan><\u002Fdiv>\n    <div class=\"component-meta\">Interaction toggles for saving workouts and reacting to posts.<\u002Fdiv>\n    <div class=\"component-deps\">Deps: UserContext, APIRequest, WorkoutRequest<\u002Fdiv>\n    <div class=\"preview\" style=\"display: flex; gap: 24px; align-items: center;\">\n      <div class=\"post-action post-action-active\" style=\"font-size: 16px;\">❤ 12<\u002Fdiv>\n      <div class=\"post-action\" style=\"font-size: 16px;\">♡ 0<\u002Fdiv>\n      <div class=\"post-action post-action-active\" style=\"font-size: 16px;\">🔖<\u002Fdiv>\n      <div class=\"post-action\" style=\"font-size: 16px; color: #717171;\">🔖<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"component-card\">\n    <div class=\"component-name\">EmptySocialHeader + EmptySocialPost <span class=\"badge badge-ready\">DS-ready<\u002Fspan><\u002Fdiv>\n    <div class=\"component-meta\">Empty state placeholders when the social feed has no content.<\u002Fdiv>\n    <div class=\"preview\">\n      <div class=\"empty-state\">\n        <div class=\"empty-icon\">📱<\u002Fdiv>\n        <div class=\"empty-text\">No posts yet. Follow other athletes to see their workouts here.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"component-card\">\n    <div class=\"component-name\">CommentsSettingsModal <span class=\"badge badge-app\">App<\u002Fspan><\u002Fdiv>\n    <div class=\"component-meta\">Settings modal for comment threads — report, block, or manage comment visibility.<\u002Fdiv>\n    <div class=\"component-deps\">Deps: UserContext, SocialRequest<\u002Fdiv>\n    <div class=\"preview\">\n      <div style=\"background: #1d1b2a; border-radius: 16px; padding: 20px;\">\n        <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n          <div style=\"display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 8px; background: #232329;\">\n            <span style=\"font-size: 14px;\">🚩<\u002Fspan>\n            <span style=\"font-size: 13px;\">Report Comment<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 8px; background: #232329;\">\n            <span style=\"font-size: 14px; color: #FF6565;\">🚫<\u002Fspan>\n            <span style=\"font-size: 13px; color: #FF6565;\">Block User<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"component-card\">\n    <div class=\"component-name\">ShareModal + ShareToInstagramModal + ShareToInstagramButton + ShareToIMessageButton + ShareToOtherButton <span class=\"badge badge-app\">App<\u002Fspan><\u002Fdiv>\n    <div class=\"component-meta\">5 SharingComponents — ShareModal is the container, ShareToInstagramModal handles IG story formatting with streak fire colors. Three share target buttons: ShareToInstagramButton, ShareToIMessageButton, ShareToOtherButton.<\u002Fdiv>\n    <div class=\"component-deps\">Platform-specific sharing APIs (expo-sharing, Instagram Stories API)<\u002Fdiv>\n    <div class=\"preview\">\n      <div style=\"background: #1d1b2a; border-radius: 16px; padding: 20px; text-align: center;\">\n        <div style=\"font-size: 14px; margin-bottom: 16px;\">Share Workout<\u002Fdiv>\n        <div class=\"share-row\">\n          <div class=\"share-btn\" style=\"background: linear-gradient(45deg, #833AB4, #E1306C, #F77737);\">📷<\u002Fdiv>\n          <div class=\"share-btn\" style=\"background: #54BE98;\">💬<\u002Fdiv>\n          <div class=\"share-btn\" style=\"background: #232329;\">↗<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size: 11px; color: #717171; margin-top: 8px;\">Instagram • iMessage • Other<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"component-card\">\n    <div class=\"component-name\">PostsFeed + VideoScreen <span class=\"badge badge-app\">App<\u002Fspan><\u002Fdiv>\n    <div class=\"component-meta\" style=\"margin-bottom: 0;\">\n      <strong>PostsFeed<\u002Fstrong> — infinite scrolling feed of SocialPost cards. Used on HomeScreen, ProfileHomeScreen, TeamScreen.<br>\n      <strong>VideoScreen<\u002Fstrong> — full-screen video player with custom controls (VideoControls is DS-ready).<br>\n      <strong>SocialPostLocation<\u002Fstrong> — location tag display (DS-ready).<br>\n      <strong>SocialPostMediaItem<\u002Fstrong> — single media attachment in a post (image or heatmap thumbnail). Screen sub-component in WorkoutScreens/EndWorkoutScreen/SocialPostMedia/.<br>\n      <strong>SocialPostMedia<\u002Fstrong> — media gallery container for post attachments. Screen sub-component with useHeatMap hook.\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>","components/components/teams":"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Teams Components<\u002Ftitle>\n<style>\n  * { margin: 0; padding: 0; box-sizing: border-box; }\n  body { background: #141121; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 32px; }\n  h1 { font-size: 24px; margin-bottom: 8px; color: #F5E989; }\n  .subtitle { color: #8D8D9C; font-size: 14px; margin-bottom: 32px; }\n  .component-card { background: #1d1b2a; border-radius: 16px; padding: 24px; margin-bottom: 16px; }\n  .component-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }\n  .component-meta { font-size: 12px; color: #8D8D9C; margin-bottom: 4px; }\n  .component-deps { font-size: 11px; color: #717171; margin-bottom: 16px; }\n  .preview { padding: 20px; background: #141121; border-radius: 12px; }\n  .badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 4px; margin-left: 4px; }\n  .badge-app { background: #302D3E; color: #FF6565; }\n  .badge-possible { background: #232329; color: #E6C466; }\n  .badge-ready { background: #232329; color: #54BE98; }\n\n  .team-card { background: #1d1b2a; border-radius: 16px; padding: 16px; display: flex; gap: 14px; align-items: center; }\n  .team-avatar { width: 56px; height: 56px; border-radius: 12px; background: #302D3E; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 24px; }\n  .team-info { flex: 1; }\n  .team-name { font-size: 15px; font-weight: 600; margin-bottom: 2px; }\n  .team-desc { font-size: 12px; color: #8D8D9C; margin-bottom: 4px; }\n  .team-stats { display: flex; gap: 12px; font-size: 11px; color: #717171; }\n  .team-join-btn { padding: 8px 16px; border-radius: 9999px; background: #F5E989; color: #141121; font-size: 12px; font-weight: 600; flex-shrink: 0; }\n\n  .leaderboard-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #232329; }\n  .leaderboard-rank { width: 28px; text-align: center; font-size: 14px; font-weight: 700; }\n  .leaderboard-avatar { width: 32px; height: 32px; border-radius: 16px; background: #302D3E; flex-shrink: 0; }\n  .leaderboard-name { flex: ass=\"subtitle\">27 components — team management, leaderboards, and member views. 3 DS-ready, 3 DS-possible, 21 app-specific.<\u002Fp>\n\n  <div class=\"component-card\">\n    <div class=\"component-name\">TeamCard <span class=\"badge badge-possible\">DS-possible<\u002Fspan><\u002Fdiv>\n    <div class=\"component-meta\">Team list card with avatar, name, description, member count, and join button.<\u002Fdiv>\n    <div class=\"component-deps\">Props: name, description, members, volume, img, openModal, team, myTeam, goToTeam, is_public<\u002Fdiv>\n    <div class=\"preview\" style=\"display: flex; flex-direction: column; gap: 12px;\">\n      <div class=\"team-card\">\n        <div class=\"team-avatar\">🏋<\u002Fdiv>\n        <div class=\"team-info\">\n          <div class=\"team-name\">Iron Warriors<\u002Fdiv>\n          <div class=\"team-desc\">Competitive powerlifting crew<\u002Fdiv>\n          <div class=\"team-stats\"><span>👥 24 members<\u002Fspan><span>💪 1.2M lbs<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"team-join-btn\">Join<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"team-card\">\n        <div class=\"team-avatar\">🏃<\u002Fdiv>\n        <div class=\"team-info\">\n          <div class=\"team-name\">Morning Grind<\u002Fdiv>\n          <div class=\"team-desc\">5AM workout accountability group<\u002Fdiv>\n          <div class=\"team-stats\"><span>👥 12 members<\u002Fspan><span>💪 450K lbs<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding: 8px 16px; border-radius: 9999px; border: 1px solid #8D8D9C; color: #8D8D9C; font-size: 12px; flex-shrink: 0;\">Joined<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"component-card\">\n    <div class=\"component-name\">LeaderboardView + LeaderboardToggleView <span class=\"badge badge-app\">App<\u002Fspan><\u002Fdiv>\n    <div class=\"component-meta\">Team leaderboard with tabs for Volume, Workouts, and Exercises. Ranks members by performance.<\u002Fdiv>\n    <div class=\"component-deps\">Deps: TeamsContext, UserContext, APIRequest<\u002Fdiv>\n    <div class=\"preview\">\n      <div class=\"toggle-header\">\n        <div class=\"toggle-tab toggle-tab-active\">Volume<\u002Fdiv>\n        <div class=\"toggle-tab\">Workouts<\u002Fdiv>\n        <div class=\"toggle-tab\">Exercises<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"leaderboard-row\">\n        <div class=\"leaderboard-rank\" style=\"color: #F5E989;\">1<\u002Fdiv>\n        <div class=\"leaderboard-avatar\"><\u002Fdiv>\n        <div class=\"leaderboard-name\">john_lifts<\u002Fdiv>\n        <div class=\"leaderboard-value\">45,200 <span class=\"leaderboard-unit\">lbs<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"leaderboard-row\">\n        <div class=\"leaderboard-rank\" style=\"color: #8D8D9C;\">2<\u002Fdiv>\n        <div class=\"leaderboard-avatar\"><\u002Fdiv>\n        <div class=\"leaderboard-name\">sarah_strong<\u002Fdiv>\n        <div class=\"leaderboard-value\">38,900 <span class=\"leaderboard-unit\">lbs<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"leaderboard-row\">\n        <div class=\"leaderboard-rank\" style=\"color: #D79029;\">3<\u002Fdiv>\n        <div class=\"leaderboard-avatar\"><\u002Fdiv>\n        <div class=\"leaderboard-name\">mike_fitness<\u002Fdiv>\n        <div class=\"leaderboard-value\">31,450 <span class=\"leaderboard-unit\">lbs<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"component-card\">\n    <div class=\"component-name\">MembersView + UserCard <span class=\"badge badge-app\">App<\u002Fspan><\u002Fdiv>\n    <div class=\"component-meta\">Team member list with role indicators and management actions.<\u002Fdiv>\n    <div class=\"component-deps\">Deps: TeamsContext, UserContext, APIRequest<\u002Fdiv>\n    <div class=\"preview\">\n      <div class=\"member-row\">\n        <div class=\"member-avatar\"><\u002Fdiv>\n        <div class=\"member-name\">john_lifts 2Fstrong> — team avatar editor (same pattern as EditableProfilePic)<br>\n      <strong>ViewAddedMembersModal<\u002Fstrong> — selected members review (DS-possible)\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>","components/components/workout":"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Workout Components<\u002Ftitle>\n<style>\n  * { margin: 0; padding: 0; box-sizing: border-box; }\n  body { background: #141121; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 32px; }\n  h1 { font-size: 24px; margin-bottom: 8px; color: #F5E989; }\n  .subtitle { color: #8D8D9C; font-size: 14px; margin-bottom: 32px; }\n  .component-card { background: #1d1b2a; border-radius: 16px; padding: 24px; margin-bottom: 16px; }\n  .component-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }\n  .component-meta { font-size: 12px; color: #8D8D9C; margin-bottom: 4px; }\n  .component-deps { font-size: 11px; color: #717171; margin-bottom: 16px; }\n  .preview { padding: 20px; background: #141121; border-radius: 12px; }\n  .badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 4px; margin-left: 4px; }\n  .badge-app { background: #302D3E; color: #FF6565; }\n  .badge-possible { background: #232329; color: #E6C466; }\n  .badge-ready { background: #232329; color: #54BE98; }\n\n  .exercise-card { background: #1d1b2a; border-radius: 12px; padding: 16px; margin-bottom: 8px; }\n  .exercise-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }\n  .exercise-name { font-size: 15px; font-weight: 600; }\n  .exercise-badge { font-size: 10px; color: #54BE98; background: rgba(84,190,152,0.15); padding: 2px 8px; border-radius: 4px; }\n  .set-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid #232329; }\n  .set-num { width: 24px; Fdiv>\n        <div class=\"ocr-info\">\n          <div style=\"font-size: 13px; font-weight: 600; margin-bottom: 2px;\">Workout Card #2<\u002Fdiv>\n          <div style=\"font-size: 11px; color: #8D8D9C;\">Awaiting processing<\u002Fdiv>\n          <div class=\"ocr-status\" style=\"background: #E6B800; color: #141121; margin-top: 4px;\">Queued<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"component-card\">\n    <div class=\"component-name\">BottomOfScreenMenu (NavBar) <span class=\"badge badge-app\">App<\u002Fspan><\u002Fdiv>\n    <div class=\"component-meta\">Main app navigation bar — Home, Workout, Stats, Profile tabs. Used in 14 screens. App-specific due to deep context + API + navigation deps.<\u002Fdiv>\n    <div class=\"component-deps\">Deps: UserContext, AutosaveContext, WorkoutRequest, SocialRequest, navigation<\u002Fdiv>\n    <div class=\"preview\">\n      <div style=\"display: flex; align-items: center; justify-content: space-around; background: #1d1b2a; border-radius: 12px; padding: 10px 8px;\">\n        <div style=\"display: flex; flex-direction: column; align-items: center; gap: 4px;\">\n          <div style=\"width: 24px; height: 24px; border-radius: 4px; background: #302D3E;\"><\u002Fdiv>\n          <div style=\"font-size: 10px; color: #8D8D9C;\">Home<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column; align-items: center; gap: 4px;\">\n          <div style=\"width: 24px; height: 24px; border-radius: 4px; background: #F5E989;\"><\u002Fdiv>\n          <div style=\"font-size: 10px; color: #F5E989;\">Workout<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column; align-items: center; gap: 4px;\">\n          <div style=\"width: 24px; height: 24px; border-radius: 4px; background: #302D3E;\"><\u002Fdiv>\n          <div style=\"font-size: 10px; color: #8D8D9C;\">Stats<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"displa flex; gap: 12px; }\n  .ph-card-stat { font-size: 9px; color: #8D8D9C; }\n\n  .ph-toggle { display: flex; gap: 0; align-self: center; margin-bottom: 4px; }\n  .ph-toggle-opt { padding: 4px 12px; border-radius: 12px; font-size: 10px; color: #8D8D9C; }\n  .ph-toggle-active { background: #F5E989; color: #141121; font-weight: 600; }\n\n  .pattern-label { text-align: center; font-size: 13px; font-weight: 600; color: #F5E989; margin-top: 12px; }\n  .pattern-components { text-align: center; font-size: 10px; color: #8D8D9C; margin-top: 4px; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <h1>Screen Layout Patterns<\u002Fh1>\n  <p class=\"subtitle\">3 recurring compositions define how most screens are built.<\u002Fp>\n\n  <div class=\"patterns-row\">\n\n    <!-- Pattern 1: Form Screen -->\n    <div>\n      <div class=\"phone-frame\">\n        <div class=\"phone-status\">9:41<\u002Fdiv>\n        <div class=\"ph-header\">\n          <div class=\"ph-header-back\">‹<\u002Fdiv>\n          <div class=\"ph-header-title\">Sign Up<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ph-body\">\n          <div>\n            <div class=\"ph-input-label\">Email<\u002Fdiv>\n            <div class=\"ph-input\"><span class=\"ph-input-placeholder\">Enter email<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div class=\"ph-input-label\">Username<\u002Fdiv>\n            <div class=\"ph-input\"><span class=\"ph-input-placeholder\">Choose username<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div class=\"ph-input-label\">Password<\u002Fdiv>\n            <div class=\"ph-input\"><span class=\"ph-input-placeholder\">Create password<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div class=\"ph-input-label\">Confirm Password<\u002Fdiv>\n            <div class=\"ph-input\"><span class=\"ph-input-placeholder\">Confirm password<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"ph-btn ph-btn-filled\">
