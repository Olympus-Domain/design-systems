4px; font-size: 8px; color: #F5E989; }\n  .ph-set-check { width: 16px; height: 16px; border-radius: 4px; border: 1px solid #302D3E; }\n  .ph-set-done { background: #54BE98; border-color: #54BE98; }\n  .ph-progress { background: #232329; border-radius: 6px; padding: 6px 8px; display: flex; justify-content: space-between; font-size: 8px; }\n  .screen-label { text-align: center; font-size: 11px; font-weight: 600; color: #F5E989; margin-top: 8px; }\n  .screen-deps { text-align: center; font-size: 9px; color: #717171; margin-top: 2px; line-height: 1.4; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <h1>Workout Screens<\u002Fh1>\n  <p class=\"subtitle\">8 main screens + 5 sub-components — the core workout creation and tracking flow.<\u002Fp>\n\n  <h2>Workout Selection &amp; Setup<\u002Fh2>\n  <div class=\"screens-row\">\n    <!-- WorkoutSelectScreen -->\n    <div class=\"screen-item\">\n      <div class=\"phone\">\n        <div class=\"ph-status\">9:41<\u002Fdiv>\n        <div class=\"ph-header\"><div class=\"ph-title\">Workouts<\u002Fdiv><div class=\"ph-action\"><\u002Fdiv><\u002Fdiv>\n        <div class=\"ph-body\" style=\"gap: 0;\">\n          <div class=\"ph-row\"><div class=\"ph-row-text\">Push Day A<\u002Fdiv><div class=\"ph-row-chevron\">›<\u002Fdiv><\u002Fdiv>\n          <div class=\"ph-row\"><div class=\"ph-row-text\">Pull Day A<\u002Fdiv><div class=\"ph-row-chevron\">›<\u002Fdiv><\u002Fdiv>\n          <div class=\"ph-row\"><div class=\"ph-row-text\">Legs Day<\u002Fdiv><div class=\"ph-row-chevron\">›<\u002Fdiv><\u002Fdiv>\n          <div class=\"ph-row\"><div class=\"ph-row-text\">Upper Body<\u002Fdiv><div class=\"ph-row-chevron\">›<\u002Fdiv><\u002Fdiv>\n          <div class=\"ph-row\"><div class=\"ph-row-text\" style=\"color: #F5E989;\">+ New Workout<\u002Fdiv><\u002Fdiv>\n          <div class=\"ph-row\"><div class=\"ph-row-text\" style=\"color: #F5E989;\">+ New Template<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ph-navbar\"><div class=\"ph-nav-dot\"><\u002Fdiv><div class=\"ph-nav-dot ph-nav-dot-active\"><\u002Fdiv><div class=\"ph-nav-dot\"><\u002Fdiv><div class=\"ph-nav-dot\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"screen-label\">WorkoutSelectScreen<\u002Fdiv>\n      <div class=\"screen-deps\">FlexibleArrowButton, NavBar, ScreenContainer, ScreenHeader<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- NewWorkoutScreen -->\n    <div class=\"screen-item\">\n      <div class=\"phone\">\n        <div class=\"ph-status\">9:41<\u002Fdiv>\n        <div class=\"ph-header\"><div class=\"ph-title\">New Workout<\u002Fdiv><div class=\"ph-action\"><\u002Fdiv><\u002Fdiv>\n        <div class=\"ph-body\">\n          <div><div class=\"ph-input-label\">Workout Name<\u002Fdiv><div class=\"ph-input\"><span class=\"ph-input-text\">Push Day A<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"ph-toggle\"><div class=\"ph-toggle-opt ph-toggle-active\">Weights<\u002Fdiv><div class=\"ph-toggle-opt\">Cardio<\u002Fdiv><\u002Fdiv>\n          <div style=\"font-size: 8px; color: #8D8D9C;\">Rest Time<\u002Fdiv>\n          <div style=\"height: 3px; background: #302D3E; border-radius: 2px; position: relative;\"><div style=\"width: 60%; height: 3px; background: #F5E989; border-radius: 2px;\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"ph-btn ph-btn-primary\" style=\"margin-top: auto;\">Start Workout<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ph-navbar\"><div class=\"ph-nav-dot\"><\u002Fdiv><div class=\"ph-nav-dot ph-nav-dot-active\"><\u002Fdiv><div class=\"ph-nav-dot\"><\u002Fdiv><div class=\"ph-nav-dot\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"screen-label\">NewWorkoutScreen<\u002Fdiv>\n      <div class=\"screen-deps\">TwoOptionToggle, RestTimeSlider, ScreenContainer, ScreenHeader, + more<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- NewTemplateScreen -->\n    <div class=\"screen-item\">\n      <div class=\"phone\">\n        <div class=\"ph-status\">9:41<\u002Fdiv>\n        <div class=\"ph-header\"><div class=\"ph-title\">New Template<\u002Fdiv><\u002Fdiv>\n        <div class=\"ph-body\">\n          <div><div class=\"ph-input-label\">Template Name<\u002Fdiv><div class=\"ph-input\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"ph-toggle\"><div class=\"ph-toggle-opt ph-toggle-active\">Weights<\u002Fdiv><div class=\"ph-toggle-opt\">Cardio<\u002Fdiv><\u002Fdiv>\n          <div><div class=\"ph-input-label\">Notes<\u002Fdiv><div class=\"ph-input\" style=\"height: 40px;\"><\u002Fdiv><\u002Fdiv>\n          <div style=\"font-size: 8px; color: #8D8D9C;\">Rest Time<\u002Fdiv>\n          <div style=\"height: 3px; background: #302D3E; border-radius: 2px;\"><div style=\"width: 40%; height: 3px; background: #F5E989; border-radius: 2px;\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"ph-btn ph-btn-primary\" style=\"margin-top: auto;\">Create Template<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ph-navbar\"><div class=\"ph-nav-dot\"><\u002Fdiv><div class=\"ph-nav-dot ph-nav-dot-active\"><\u002Fdiv><div class=\"ph-nav-dot\"><\u002Fdiv><div class=\"ph-nav-dot\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"screen-label\">NewTemplateScreen<\u002Fdiv>\n      <div class=\"screen-deps\">Same as NewWorkout without ChooseWorkoutTargetAthleteModal<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- NewProgramScreen -->\n    <div class=\"screen-item\">\n      <div class=\"phone\">\n        <div class=\"ph-status\">9:41<\u002Fdiv>\n        <div class=\"ph-header\"><div class=\"ph-title\">New Program<\u002Fdiv><\u002Fdiv>\n        <div class=\"ph-body\">\n          <div><div class=\"ph-input-label\">Program Name<\u002Fdiv><div class=\"ph-input\"><\u002Fdiv><\u002Fdiv>\n          <div><div class=\"ph-input-label\">Description<\u002Fdiv><div class=\"ph-input\" style=\"height: 40px;\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"ph-btn ph-btn-primary\" style=\"margin-top: auto;\">Create Program<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ph-navbar\"><div class=\"ph-nav-dot\"><\u002Fdiv><div class=\"ph-nav-dot ph-nav-dot-active\"><\u002Fdiv><div class=\"ph-nav-dot\"><\u002Fdiv><div class=\"ph-nav-dot\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"screen-label\">NewProgramScreen<\u002Fdiv>\n      <div class=\"screen-deps\">FlexibleLargeButton, FlexibleTextInput, ScreenContainer, ScreenHeader<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <h2>Active Workout &amp; Completion<\u002Fh2>\n  <div class=\"screens-row\">\n    <!-- WorkoutSummaryScreen -->\n    <div class=\"screen-item\">\n      <div class=\"phone\">\n        <div class=\"ph-status\">9:41<\u002Fdiv>\n        <div class=\"ph-progress\"><span style=\"color: #F5E989;\">In progress<\u002Fspan><span style=\"color: #8D8D9C;\">00:42:15<\u002Fspan><\u002Fdiv>\n        <div class=\"ph-body\" style=\"gap: 4px;\">\n          <div class=\"ph-card\">\n            <div style=\"font-size: 10px; font-weight: 600; margin-bottom: 4px;\">Bench Press<\u002Fdiv>\n            <div class=\"ph-set\"><div class=\"ph-set-num\">1<\u002Fdiv><div class=\"ph-set-input\">185<\u002Fdiv><div class=\"ph-set-input\">8<\u002Fdiv><div class=\"ph-set-check ph-set-done\"><\u002Fdiv><\u002Fdiv>\n            <div class=\"ph-set\"><div class=\"ph-set-num\">2<\u002Fdiv><div class=\"ph-set-input\">185<\u002Fdiv><div class=\"ph-set-input\">7<\u002Fdiv><div class=\"ph-set-check ph-set-done\"><\u002Fdiv><\u002Fdiv>\n            <div class=\"ph-set\"><div class=\"ph-set-num\">3<\u002Fdiv><div class=\"ph-set-input\"><\u002Fdiv><div class=\"ph-set-input\"><\u002Fdiv><div class=\"ph-set-check\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; gap: 4px; font-size: 8px;\">\n            <div style=\"flex:1; padding:6px; border:1px solid #3b3651; border-radius:6px; text-align:center; color:#8D8D9C;\">+ Exercise<\u002Fdiv>\n            <div style=\"flex:1; padding:6px; border:1px solid #3b3651; border-radius:6px; text-align:center; color:#8D8D9C;\">+ Superset<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ph-navbar\"><div class=\"ph-nav-dot\"><\u002Fdiv><div class=\"ph-nav-dot ph-nav-dot-active\"><\u002Fdiv><div class=\"ph-nav-dot\"><\u002Fdiv><div class=\"ph-nav-dot\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"screen-label\">WorkoutSummaryScreen<\u002Fdiv>\n      <div class=\"screen-deps\">ExerciseCard, SetInput, RestTimer, ExerciseSupersetRest, WorkoutInProgressBar, + more<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EndWorkoutScreen -->\n    <div class=\"screen-item\">\n      <div class=\"phone\">\n        <div class=\"ph-status\">9:41<\u002Fdiv>\n        <div class=\"ph-header\"><div class=\"ph-title\">End Workout<\u002Fdiv><\u002Fdiv>\n        <div class=\"ph-body\">\n          <div style=\"display: flex; gap: 8px; font-size: 8px; text-align: center;\">\n            <div style=\"flex:1;\"><div style=\"font-size: 14px; font-weight: 700; color: #F5E989;\">12,450<\u002Fdiv><div style=\"color:#717171;\">lbs<\u002Fdiv><\u002Fdiv>\n            <div style=\"flex:1;\"><div style=\"font-size: 14px; font-weight: 700; color: #F5E989;\">58<\u002Fdiv><div style=\"color:#717171;\">min<\u002Fdiv><\u002Fdiv>\n            <div style=\"flex:1;\"><div style=\"font-size: 14px; font-weight: 700; color: #F5E989;\">3<\u002Fdiv><div style=\"color:#717171;\">PRs<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div><div class=\"ph-input-label\">Caption<\u002Fdiv><div class=\"ph-input\" style=\"height: 40px;\"><\u002Fdiv><\u002Fdiv>\n          <div><div class=\"ph-input-label\">Location<\u002Fdiv><div class=\"ph-input\"><span class=\"ph-input-text\">📍 Add location<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:4px;\">\n            <div class=\"ph-skeleton\" style=\"width:48px; height:48px; border-radius:8px;\"><\u002Fdiv>\n            <div class=\"ph-skeleton\" style=\"width:48px; height:48px; border-radius:8px;\"><\u002Fdiv>\n            <div style=\"width:48px; height:48px; border-radius:8px; border:1px dashed #3b3651; display:flex; align-items:center; justify-content:center; font-size:16px; color:#3b3651;\">+<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"ph-btn ph-btn-primary\" style=\"margin-top: auto;\">Post Workout<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ph-navbar\"><div class=\"ph-nav-dot\"><\u002Fdiv><div class=\"ph-nav-dot ph-nav-dot-active\"><\u002Fdiv><div class=\"ph-nav-dot\"><\u002Fdiv><div class=\"ph-nav-dot\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"screen-label\">EndWorkoutScreen<\u002Fdiv>\n      <div class=\"screen-deps\">EndWorkoutHeader, LocationPicker, LocationSearchModal, SocialPostMedia, SocialPostMediaItem, + form<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- DetailedWorkoutView -->\n    <div class=\"screen-item\">\n      <div class=\"phone\">\n        <div class=\"ph-status\">9:41<\u002Fdiv>\n        <div class=\"ph-header\"><div class=\"ph-back\">‹<\u002Fdiv><div class=\"ph-title\" style=\"font-size: 11px;\">Workout Detail<\u002Fdiv><div class=\"ph-action\"><\u002Fdiv><\u002Fdiv>\n        <div class=\"ph-body\" style=\"gap: 4px;\">\n          <div class=\"ph-card\">\n            <div style=\"display:flex; gap:6px; align-items:center; margin-bottom:4px;\"><div style=\"width:20px; height:20px; border-radius:10px; background:#302D3E;\"><\u002Fdiv><div style=\"font-size:9px; font-weight:600;\">Push Day A<\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex; gap:8px; font-size:7px; color:#8D8D9C;\"><span>12,450 lbs<\u002Fspan><span>58 min<\u002Fspan><span>3 PRs<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"ph-toggle\"><div class=\"ph-toggle-opt ph-toggle-active\">Summary<\u002Fdiv><div class=\"ph-toggle-opt\">Exercises<\u002Fdiv><\u002Fdiv>\n          <div class=\"ph-row\"><div class=\"ph-row-text\">Bench Press • 4×8<\u002Fdiv><\u002Fdiv>\n          <div class=\"ph-row\"><div class=\"ph-row-text\">OHP • 3×10<\u002Fdiv><\u002Fdiv>\n          <div class=\"ph-row\"><div class=\"ph-row-text\">Incline DB • 3×12<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ph-navbar\"><div class=\"ph-nav-dot\"><\u002Fdiv><div class=\"ph-nav-dot ph-nav-dot-active\"><\u002Fdiv><div class=\"ph-nav-dot\"><\u002Fdiv><div class=\"ph-nav-dot\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"screen-label\">DetailedWorkoutView<\u002Fdiv>\n      <div class=\"screen-deps\">FlexibleHeader, MultipleChoice, SocialPostHeader, VolumeTimePRsBadges<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Sub-components list -->\n    <div class=\"screen-item\">\n      <div style=\"background: #1d1b2a; border-radius: 16px; padding: 16px; height: 100%; display: flex; flex-direction: column; justify-content: center;\">\n        <div style=\"font-size: 12px; font-weight: 600; color: #F5E989; margin-bottom: 12px;\">Screen Sub-components<\u002Fdiv>\n        <div style=\"font-size: 10px; color: #8D8D9C; line-height: 1.8;\">\n          <strong style=\"color:#fff;\">LocationPicker<\u002Fstrong> — map-based location selector<br>\n          <strong style=\"color:#fff;\">LocationSearchModal<\u002Fstrong> — text search for locations (uses PopUpClose)<br>\n          <strong style=\"color:#fff;\">SocialPostMedia<\u002Fstrong> — media gallery for post attachments<br>\n          <strong style=\"color:#fff;\">SocialPostMediaItem<\u002Fstrong> — single image/heatmap in gallery<br>\n          <strong style=\"color:#fff;\">useHeatMap<\u002Fstrong> — hook generating heatmap from workout data\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"screen-label\">EndWorkoutScreen/*<\u002Fdiv>\n      <div class=\"screen-deps\">5 sub-components in WorkoutScreens/components/<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Olympus Design System"}
